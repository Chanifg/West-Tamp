version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: westtamp_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: westtamp
      MYSQL_ROOT_PASSWORD: password
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: westtamp_backend
    restart: unless-stopped
    volumes:
      - ./backend:/var/www/html
    ports:
      - "8000:8000"
    command: >
      bash -c "composer install && php artisan serve --host=0.0.0.0 --port=8000"
    depends_on:
      - mysql

  frontend:
    image: node:20
    container_name: westtamp_frontend
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    command: >
      bash -c "npm install && npm run dev -- --host"

volumes:
  dbdata:
